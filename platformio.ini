; Electro — Tara Robot Firmware
; Board: ESP32 Dev Module
;
; Flash robot:     pio run -e robot -t upload
; Flash OLED test: pio run -e test-oled -t upload
; Serial monitor:  pio device monitor

[env]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_port   = /dev/cu.usbserial-0001
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    olikraus/U8g2@^2.35.30
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.9
    http://192.168.0.107:30600/api/files/log4c/log4c/2.3.0/log4c.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b
    http://192.168.0.107:30600/api/files/ota4h/ota4h/1.0.0/ota4h.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b
    http://192.168.0.107:30600/api/files/wifi4h/wifi4h/1.0.1/wifi4h.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b
    http://192.168.0.107:30600/api/files/config4h/config4h/1.0.0/config4h.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b
    http://192.168.0.107:30600/api/files/reg4h/reg4h/1.0.0/reg4h.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b
    http://192.168.0.107:30600/api/files/health-check/health-check/1.0.2/health-check.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b
    http://192.168.0.107:30600/api/files/face/face/2.0.0/face.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b
    http://192.168.0.107:30600/api/files/display4h/display4h/1.0.0/display4h.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b
    http://192.168.0.107:30600/api/files/tara-face/tara-face/3.4.2/tara-face.zip?token=pkt_80ac81f169aeb0463050420e261568af7d045950d50dceb21f53a55cc123e06b

[env:robot]
build_src_filter = +<*> -<factory_reset.cpp>
build_flags =
    -DDEVICE_NAME='"Tara"'
    -DDEVICE_TYPE='"robot"'
    -DFW_VERSION='"2.9.1"'
    -DPROV_WIFI_SSID='"YourSSID"'
    -DPROV_WIFI_PASS='"YourPass"'
    -DPROV_SERVER_URL='"http://192.168.0.107:4000"'
    -DPROV_MQTT_HOST='"192.168.0.107"'

[env:expressions-demo]
build_src_filter = +<../examples/TaraExpressionsDemo/TaraExpressionsDemo.ino>

[env:test-oled]
build_src_filter = +<oled_test.cpp>

[env:factory-reset]
build_src_filter = +<factory_reset.cpp>
