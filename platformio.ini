; Electro — Tara Robot Firmware
; Board: ESP32 Dev Module
;
; Flash robot:     pio run -e robot -t upload
; Flash OLED test: pio run -e test-oled -t upload
; Serial monitor:  pio device monitor

[env]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_port   = /dev/cu.usbserial-0001
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    olikraus/U8g2@^2.35.30
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.9

[env:robot]
build_src_filter = +<*> -<factory_reset.cpp>
build_flags =
    -DDEVICE_NAME='"Tara"'
    -DDEVICE_TYPE='"robot"'
    -DFW_VERSION='"1.5.0"'
    -DPROV_WIFI_SSID='"YourSSID"'
    -DPROV_WIFI_PASS='"YourPass"'
    -DPROV_SERVER_URL='"http://192.168.0.107:4000"'
    -DPROV_MQTT_HOST='"192.168.0.107"'

[env:expressions-demo]
build_src_filter = +<../examples/TaraExpressionsDemo/TaraExpressionsDemo.ino>

[env:test-oled]
build_src_filter = +<oled_test.cpp>

[env:factory-reset]
build_src_filter = +<factory_reset.cpp>
