; Electro — Tara Robot Firmware
; Board: ESP32 Dev Module
; Display: ST7735 128x160 V1.1 (SPI)
;
; Flash robot:     pio run -e robot -t upload
; Touch test:      pio run -e test-touch -t upload
; Factory reset:   pio run -e factory-reset -t upload
; Serial monitor:  pio device monitor

[env]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_port   = /dev/cu.usbserial-0001
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.4
    adafruit/Adafruit GFX Library@^1.11.9
    http://pi-nest.local:30600/api/files/log4c/log4c/2.3.0/log4c.zip
    http://pi-nest.local:30600/api/files/ota4h/ota4h/1.0.0/ota4h.zip
    http://pi-nest.local:30600/api/files/wifi4h/wifi4h/1.0.1/wifi4h.zip
    http://pi-nest.local:30600/api/files/config4h/config4h/1.0.0/config4h.zip
    http://pi-nest.local:30600/api/files/reg4h/reg4h/1.0.0/reg4h.zip
    http://pi-nest.local:30600/api/files/health-check/health-check/1.0.2/health-check.zip
    http://pi-nest.local:30600/api/files/face/face/2.1.0/face.zip
    http://pi-nest.local:30600/api/files/display4h/display4h/1.0.0/display4h.zip
    http://pi-nest.local:30600/api/files/tara-face/tara-face/3.6.1/tara-face.zip
    http://pi-nest.local:30600/api/files/touch-me/touch-me/1.2.0/touch-me.zip

[env:robot]
build_src_filter = +<*> -<factory_reset.cpp> -<touch_test.cpp> -<face_test.cpp>
build_flags =
    -DDEVICE_NAME='"Tara"'
    -DDEVICE_TYPE='"robot"'
    -DFW_VERSION='"3.5.0"'
    -DPROV_WIFI_SSID='"YourSSID"'
    -DPROV_WIFI_PASS='"YourPass"'
    -DPROV_SERVER_URL='"http://pi-nest.local:4000"'
    -DPROV_MQTT_HOST='"pi-nest.local"'

[env:expressions-demo]
build_src_filter = +<../examples/TaraExpressionsDemo/TaraExpressionsDemo.ino>

[env:factory-reset]
build_src_filter = +<factory_reset.cpp>

[env:test-touch]
build_src_filter = +<touch_test.cpp>

[env:test-face]
build_src_filter = +<face_test.cpp>
lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.4
    adafruit/Adafruit GFX Library@^1.11.9
