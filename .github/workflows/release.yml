name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: self-hosted
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.value }}
      skipped: ${{ steps.create.outputs.skipped }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            --latest
          echo "skipped=false" >> "$GITHUB_OUTPUT"

  publish:
    name: Build and publish firmware
    runs-on: self-hosted
    needs: release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Inject version
        run: |
          VERSION=${{ needs.release.outputs.version }}
          sed -i "s/-DFW_VERSION='\"[^\"]*\"'/-DFW_VERSION='\"${VERSION}\"'/" platformio.ini

      - name: Compile robot firmware
        run: pio run -e robot

      - name: Package firmware
        run: |
          VERSION=${{ needs.release.outputs.version }}
          cp .pio/build/robot/firmware.bin "tara-robo-${VERSION}.bin"

      - name: Upload to Pocket
        run: |
          VERSION=${{ needs.release.outputs.version }}
          FIRMWARE="tara-robo-${VERSION}.bin"
          curl -f -X POST \
            "${{ secrets.POCKET_BASE_URL }}/api/repos/tara-robo/artifacts" \
            -H "x-pocket-token: ${{ secrets.POCKET_API_KEY }}" \
            -F "file=@${FIRMWARE}" \
            -F "name=tara-robo" \
            -F "version=${VERSION}"
